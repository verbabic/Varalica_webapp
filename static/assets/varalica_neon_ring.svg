<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28" result="blur1"/>
      <feGaussianBlur stdDeviation="72" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softParticleGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="particleBlur"/>
      <feMerge>
        <feMergeNode in="particleBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crackGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="crackBlur"/>
      <feMerge>
        <feMergeNode in="crackBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="ringCore" cx="50%" cy="50%" r="50%">
      <stop offset="52%" stop-color="#ff073a" stop-opacity="0"/>
      <stop offset="68%" stop-color="#ff073a" stop-opacity="0.12"/>
      <stop offset="77%" stop-color="#ff174d" stop-opacity="0.68"/>
      <stop offset="81%" stop-color="#ff6b7c" stop-opacity="0.96"/>
      <stop offset="86%" stop-color="#ff073a" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#5d0014" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hotStroke" x1="184" y1="214" x2="842" y2="818">
      <stop stop-color="#ffb3bd"/>
      <stop offset="0.18" stop-color="#ff1646"/>
      <stop offset="0.5" stop-color="#ff0033"/>
      <stop offset="0.76" stop-color="#ff5f75"/>
      <stop offset="1" stop-color="#97001f"/>
    </linearGradient>
    <linearGradient id="crackStroke" x1="260" y1="178" x2="764" y2="844">
      <stop stop-color="#ff8293"/>
      <stop offset="0.48" stop-color="#ff123f"/>
      <stop offset="1" stop-color="#8e001e"/>
    </linearGradient>
  </defs>

  <g opacity="0.98">
    <circle cx="512" cy="512" r="354" fill="url(#ringCore)" filter="url(#outerGlow)"/>
    <circle cx="512" cy="512" r="311" stroke="#4b0011" stroke-opacity="0.45" stroke-width="18"/>
    <circle cx="512" cy="512" r="318" stroke="url(#hotStroke)" stroke-width="9" filter="url(#outerGlow)"/>
    <circle cx="512" cy="512" r="285" stroke="#ff073a" stroke-opacity="0.45" stroke-width="3"/>
    <circle cx="512" cy="512" r="348" stroke="#ff073a" stroke-opacity="0.22" stroke-width="5"/>

    <path d="M229 372 C263 349 292 356 319 332 C343 311 352 283 383 267"
          stroke="url(#crackStroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>
    <path d="M742 257 C719 296 729 321 693 350 C668 371 635 369 612 402"
          stroke="url(#crackStroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>
    <path d="M808 565 C770 573 758 598 722 604 C690 609 667 592 637 615"
          stroke="url(#crackStroke)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>
    <path d="M353 808 C377 768 365 742 400 716 C431 693 462 703 489 672"
          stroke="url(#crackStroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>
    <path d="M181 520 C222 512 246 529 281 511 C307 498 319 473 353 468"
          stroke="#ff3158" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>
    <path d="M585 177 C594 221 620 240 614 279 C610 309 591 329 598 362"
          stroke="#ff3158" stroke-opacity="0.62" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#crackGlow)"/>

    <g filter="url(#softParticleGlow)">
      <circle cx="185" cy="420" r="7" fill="#ff2f55" opacity="0.9"/>
      <circle cx="248" cy="270" r="4" fill="#ff7588" opacity="0.75"/>
      <circle cx="342" cy="176" r="6" fill="#ff123f" opacity="0.84"/>
      <circle cx="512" cy="143" r="5" fill="#ff7387" opacity="0.7"/>
      <circle cx="674" cy="181" r="8" fill="#ff204b" opacity="0.82"/>
      <circle cx="815" cy="318" r="5" fill="#ff8a99" opacity="0.7"/>
      <circle cx="863" cy="495" r="7" fill="#ff1646" opacity="0.82"/>
      <circle cx="822" cy="668" r="4" fill="#ff7588" opacity="0.74"/>
      <circle cx="701" cy="827" r="6" fill="#ff234d" opacity="0.84"/>
      <circle cx="534" cy="882" r="5" fill="#ff8293" opacity="0.68"/>
      <circle cx="352" cy="836" r="8" fill="#ff1646" opacity="0.8"/>
      <circle cx="207" cy="682" r="5" fill="#ff7588" opacity="0.76"/>
      <circle cx="151" cy="545" r="4" fill="#ff3158" opacity="0.72"/>
      <circle cx="287" cy="613" r="3" fill="#ff9aa8" opacity="0.8"/>
      <circle cx="746" cy="453" r="3" fill="#ff9aa8" opacity="0.8"/>
      <circle cx="443" cy="240" r="3" fill="#ff9aa8" opacity="0.72"/>
    </g>

    <path d="M207 454 C239 302 361 203 512 196 C699 188 837 326 835 514"
          stroke="#ff5d73" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
    <path d="M817 576 C782 724 661 821 514 828 C329 837 188 704 188 518"
          stroke="#ff0b39" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
